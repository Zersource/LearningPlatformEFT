# ==========================================
# LearningPlatformEFT - Configuracion
# ==========================================

spring.application.name=LearningPlatformEFT

# --- H2 Database (en memoria) ---
spring.datasource.url=jdbc:h2:mem:learningplatformdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Necesario para que data.sql se ejecute DESPUES de que JPA crea las tablas
spring.jpa.defer-datasource-initialization=true

# --- Consola H2 (util para ver los datos en el browser) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Spring Boot Actuator ---
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# --- Puerto del servidor ---
server.port=8080
